<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Bird 3D Multiplayer</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <!-- ── Landing ─────────────────────────────────────── -->
  <div id="screen-landing" class="screen active">
    <div class="title-wrap">
      <div class="title-bird">🐦</div>
      <h1>FLAPPY BIRD <span class="tag">3D</span></h1>
      <p class="subtitle">Multiplayer Party Mode</p>
    </div>
    <div class="card">
      <input id="landing-name" type="text" placeholder="Your name" maxlength="16" />
      <div class="btn-row">
        <button id="btn-create" class="btn btn-primary">Create Room</button>
        <button id="btn-join-show" class="btn btn-secondary">Join Room</button>
      </div>
      <div id="join-form" class="hidden">
        <input id="join-code" type="text" placeholder="Room code (e.g. AB12)" maxlength="4" />
        <button id="btn-join" class="btn btn-accent">Join</button>
      </div>
      <button id="btn-leaderboard-show" class="btn btn-ghost">🏆 Leaderboard</button>
      <p id="landing-error" class="error-msg"></p>
    </div>
  </div>

  <!-- ── Lobby ────────────────────────────────────────── -->
  <div id="screen-lobby" class="screen">
    <div class="lobby-header">
      <h2>Room <span id="lobby-code" class="code-badge"></span></h2>
      <p id="lobby-status">Waiting for players…</p>
    </div>
    <div id="lobby-players" class="player-grid"></div>
    <div id="lobby-host-controls" class="hidden">
      <div class="level-picker">
        <span>Difficulty:</span>
        <button class="lvl-btn active" data-level="easy">Easy</button>
        <button class="lvl-btn" data-level="medium">Medium</button>
        <button class="lvl-btn" data-level="hard">Hard</button>
      </div>
      <button id="btn-start" class="btn btn-primary btn-big">▶ Start Game</button>
    </div>
    <p id="lobby-guest-msg" class="hidden muted">Waiting for host to start…</p>
  </div>

  <!-- ── Game ─────────────────────────────────────────── -->
  <div id="screen-game" class="screen">
    <canvas id="game-canvas"></canvas>
    <div id="hud">
      <div id="hud-scores"></div>
      <div id="hud-level"></div>
    </div>
    <div id="flap-hint">SPACE / TAP to Flap</div>
  </div>

  <!-- ── Game Over ─────────────────────────────────────── -->
  <div id="screen-gameover" class="screen">
    <div class="card gameover-card">
      <h2>Round Over!</h2>
      <div id="results-list"></div>
      <div id="gameover-host-btns" class="hidden btn-row">
        <button id="btn-play-again" class="btn btn-primary">▶ Play Again</button>
        <button id="btn-back-lobby" class="btn btn-secondary">Lobby</button>
      </div>
      <p id="gameover-guest-msg" class="hidden muted">Waiting for host…</p>
    </div>
  </div>

  <!-- ── Leaderboard ───────────────────────────────────── -->
  <div id="screen-leaderboard" class="screen">
    <div class="card lb-card">
      <h2>🏆 Leaderboard</h2>
      <table id="lb-table">
        <thead><tr><th>#</th><th>Player</th><th>Score</th><th>Level</th></tr></thead>
        <tbody id="lb-body"></tbody>
      </table>
      <button id="btn-lb-back" class="btn btn-ghost">← Back</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
